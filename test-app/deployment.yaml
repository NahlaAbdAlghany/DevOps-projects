apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx
        image: 852405188872.dkr.ecr.us-west-2.amazonaws.com/myimages:59bfd5d743e3c034e4dc3ef4f3cea61953757748
        ports:
        - containerPort: 80

        