apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx
        image: 852405188872.dkr.ecr.us-west-2.amazonaws.com/myimages:cf738729a59373f978de7ee8261dfa897cba704e
        ports:
        - containerPort: 80

        