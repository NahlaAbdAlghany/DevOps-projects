apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NahlaAbdAlghany/DevOps-projects.git'
    targetRevision: cicd-github-actions
    path: gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true