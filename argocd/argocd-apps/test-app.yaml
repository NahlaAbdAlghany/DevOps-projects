apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://github.com/NahlaAbdAlghany/DevOps-projects.git'
    targetRevision: cicd-github-actions
    path: test-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true