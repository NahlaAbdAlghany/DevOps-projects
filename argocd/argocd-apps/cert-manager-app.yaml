apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.14.5
    helm:
      values: |
        installCRDs: true
        featureGates: "ExperimentalGatewayAPISupport=true"

        # Pod Identity assigns the cert-manager-dns01 IAM role to this service account
        # via aws_eks_pod_identity_association — no annotation needed here.
        # GCP credential config tells the GCP SDK how to exchange the AWS token
        extraEnv:
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: /var/secrets/gcp/config.json
          - name: AWS_DEFAULT_REGION
            value: us-west-2

        volumes:
          - name: gcp-wif
            secret:
              secretName: gcp-wif-credentials

        volumeMounts:
          - name: gcp-wif
            mountPath: /var/secrets/gcp
            readOnly: true            
                  
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
