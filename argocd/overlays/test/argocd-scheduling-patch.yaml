apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  template:
    spec:
      nodeSelector:
        role: argocd
      tolerations:
        - key: dedicated
          value: argocd
          effect: NoSchedule
---
