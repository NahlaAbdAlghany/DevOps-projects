name: 02 - Terraform CI

# LESSON: 'paths' filter — only trigger when terraform files actually changed
on:
  pull_request:
    branches: [eks-cluster]   # fires when a PR targets eks-cluster (your base branch)

  workflow_dispatch:

jobs:
  terraform-validate:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: eks-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-west-2

      - name: Terraform Init
        id: init
        run: terraform init

      # LESSON: fmt -check fails the step if any file isn't formatted — enforces code style
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      # LESSON: validate checks syntax and internal consistency without calling AWS
      - name: Terraform Validate
        id: validate
        run: terraform validate

      # LESSON: plan shows what WOULD change on AWS — output visible in Actions logs
      - name: Terraform Plan
        run: terraform plan -no-color
