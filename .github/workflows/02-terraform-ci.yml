name: 02 - Terraform CI

# LESSON: 'paths' filter — only trigger when terraform files actually changed
on:
  pull_request:
    branches: [eks-cluster]   # fires when a PR targets eks-cluster (your base branch)

  workflow_dispatch:

jobs:
  terraform-validate:
    runs-on: self-hosted
    # LESSON: workflows need explicit permissions to write PR comments
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        working-directory: eks-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-west-2

      # LESSON: setup-terraform wraps the terraform binary so that stdout/stderr
      # are captured and exposed as step outputs (steps.X.outputs.stdout)
      # Without this, steps.plan.outputs.stdout is always empty
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform init

      # LESSON: fmt -check fails the step if any file isn't formatted — enforces code style
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      # LESSON: validate checks syntax and internal consistency without calling AWS
      - name: Terraform Validate
        id: validate
        run: terraform validate

      # LESSON: redirect plan output to a file so we can read it reliably later
      # steps.plan.outputs.stdout is unreliable on self-hosted runners
      # LESSON: use PowerShell redirection on Windows runners — 'tee' is not reliable
      # $env:GITHUB_WORKSPACE gives the absolute path so both steps find the same file
      - name: Terraform Plan
        id: plan
        shell: pwsh
        run: terraform plan -no-color *>&1 | Out-File -FilePath "$env:GITHUB_WORKSPACE\plan.txt" -Encoding utf8
        continue-on-error: true

      - name: Post Plan output to PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');
            const planPath = path.join(process.env.GITHUB_WORKSPACE, 'plan.txt');
            const plan = fs.readFileSync(planPath, 'utf8');
            const body = [
              '### Terraform Plan',
              '```',
              plan,
              '```',
              `**Status:** \`${process.env.PLAN_OUTCOME}\``,
              `**Triggered by:** @${{ github.actor }}`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # LESSON: fail the whole job AFTER posting the comment, if plan itself failed
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
